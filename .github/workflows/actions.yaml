name: GitHub Actions

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version:
          - 18
          - 20
          - 22
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js v${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      # - run: npm test

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # addedAt-coverage eval needs the merge-base with main to diff
          # records added in the PR. fetch-depth: 0 = full history.
          fetch-depth: 0
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      # Enforce that every new data record carries `addedAt`. Without it the
      # homepage "最近更新" derive layer (src/utils/derived-updates.ts) would
      # silently miss the change. See scripts/evals/addedAt-coverage/check.ts
      # for the failure mode this catches.
      - name: addedAt coverage (PR diff vs main)
        run: npm run eval:addedAt -- --base=origin/main

      # Enforce that every mddiSpeeches entry in voices.ts has a matching
      # speechTranscripts entry with non-empty paragraphs + paragraphsEn.
      # Without it, /speeches/<id>/ silently renders the "尚未本地存档"
      # fallback. See scripts/evals/transcript-coverage/check.ts.
      - name: transcript coverage (PR diff vs main)
        run: npm run eval:transcript -- --base=origin/main

      # Layer E — source-level i18n hardcode scan.
      # Hard-fails when a PR introduces NEW `lang === 'zh' ?` / `isZh ?` /
      # `COPY[lang] ?? COPY.en` (without ja branch) anti-patterns above
      # the snapshotted baseline. The baseline tracks 518 grandfathered
      # 2-locale ternaries from before 2026-05-10 — a known backlog being
      # burned down PR by PR. Re-snapshot via
      # `npm run eval:source-i18n -- --baseline` after planned removals.
      # See scripts/evals/source-i18n-hardcode/check.ts for the failure mode
      # and docs/CHANGELOG.md (2026-05-10) for the regression context.
      - name: Source i18n hardcode scan (no new findings beyond baseline)
        run: npm run eval:source-i18n
