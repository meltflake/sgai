name: GitHub Actions

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version:
          - 18
          - 20
          - 22
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js v${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      # - run: npm test

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # addedAt-coverage eval needs the merge-base with main to diff
          # records added in the PR. fetch-depth: 0 = full history.
          fetch-depth: 0
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      # Enforce that every new data record carries `addedAt`. Without it the
      # homepage "最近更新" derive layer (src/utils/derived-updates.ts) would
      # silently miss the change. See scripts/evals/addedAt-coverage/check.ts
      # for the failure mode this catches.
      - name: addedAt coverage (PR diff vs main)
        run: npm run eval:addedAt -- --base=origin/main
